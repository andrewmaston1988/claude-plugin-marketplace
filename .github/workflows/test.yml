name: Tests

on:
  pull_request:
  push:
    branches: [master]

jobs:
  checkpoint:
    name: checkpoint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run tests
        run: node --test plugins/checkpoint/hooks/tests/*.test.mjs

  slack-bridge:
    name: slack-bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Unit tests
        run: node --test plugins/slack-bridge/tests/*.test.mjs

  pipeline:
    name: pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: plugins/pipeline/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: plugins/pipeline
      - name: Core tests
        working-directory: plugins/pipeline
        run: |
          FILES=$(ls tests/*.mjs | grep -v parity-runner)
          node --env-file=.env.test --test $FILES
      - name: Parity tests
        working-directory: plugins/pipeline
        run: node --env-file=.env.test --test tests/parity-runner.mjs
      - name: Script tests
        working-directory: plugins/pipeline
        run: node --test src/hooks/*.test.mjs src/db/*.test.mjs skills/merge/scripts/*.test.mjs
